# Not needed when using Nix (flake.nix). Uncomment for non-Nix environments.
# [tools]
# go = "1.25"
# bun = "1.3"

[tasks.dev]
depends = ["dev-db", "dev-backend", "dev-frontend"]
description = "Start DB, backend, and frontend"

[tasks.dev-db]
run = """
docker start wordle-db 2>/dev/null || \
docker run -d --name wordle-db \
  -e POSTGRES_PASSWORD=postgres \
  -e POSTGRES_DB=wordle \
  -p 5432:5432 \
  postgres:16
echo "Waiting for PostgreSQL..."
until docker exec wordle-db pg_isready -U postgres > /dev/null 2>&1; do sleep 0.5; done
echo "PostgreSQL is ready"
"""
description = "Start PostgreSQL container"

[tasks.db-setup]
run = """
docker exec -i wordle-db psql -U postgres -d wordle < backend/sql/schema.sql
docker exec -i wordle-db psql -U postgres -d wordle < backend/sql/seed.sql
"""
depends = ["dev-db"]
description = "Apply schema and seed data"

[tasks.dev-backend]
run = "cd backend && air"
depends = ["dev-db"]
description = "Start Go backend with hot reload"

[tasks.dev-frontend]
run = "cd frontend && bun run dev"
description = "Start SvelteKit dev server"

[tasks.sqlc]
run = "cd backend && sqlc generate"
description = "Generate sqlc code"

[tasks.build-backend]
run = "cd backend && go build ./..."
description = "Build Go backend"

[tasks.build-frontend]
run = "cd frontend && bun run build"
description = "Build SvelteKit frontend"

[tasks.lint-backend]
run = "cd backend && golangci-lint run ./..."
description = "Lint Go backend"

[tasks.lint-frontend]
run = "cd frontend && bunx biome check ."
description = "Lint frontend"

[tasks.lint]
depends = ["lint-backend", "lint-frontend"]
description = "Lint all"

[tasks.format-backend]
run = "cd backend && goimports -w . && gofmt -w ."
description = "Format Go backend"

[tasks.format-frontend]
run = "cd frontend && bunx biome check --write ."
description = "Format frontend"

[tasks.format]
depends = ["format-backend", "format-frontend"]
description = "Format all"
